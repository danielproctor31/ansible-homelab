- name: Check if SSH public key exists
  stat:
    path: "{{ lookup('env','HOME') }}/.ssh/id_rsa.pub"
  delegate_to: localhost
  register: ssh_key_file
  become: false

- name: Set authorized key for user
  ansible.posix.authorized_key:
    user: "{{ created_username }}"
    state: present
    key: "{{ lookup('file', lookup('env','HOME') + '/.ssh/id_rsa.pub') }}"
  when: ssh_key_file.stat.exists

- name: Warn if SSH key doesn't exist
  debug:
    msg: "WARNING: SSH public key not found at ~/.ssh/id_rsa.pub - skipping key setup"
  when: not ssh_key_file.stat.exists

- name: Backup SSH configuration
  copy:
    src: /etc/ssh/sshd_config
    dest: /etc/ssh/sshd_config.backup
    remote_src: yes
    force: no

- name: Configure SSHD
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PubkeyAuthentication", line: "PubkeyAuthentication yes" }
    - { regexp: "^#?Port", line: "Port 22" }
  notify: restart ssh

- name: Remove /etc/ssh/sshd_config.d/50-cloud-init.conf
  file:
    path: /etc/ssh/sshd_config.d/50-cloud-init.conf
    state: absent
  notify: restart ssh
